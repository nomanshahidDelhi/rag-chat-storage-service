spring:
  application:
    name: chat-storage-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jackson:
    default-property-inclusion: non_null
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100
        one-indexed-parameters: false

server:
  port: ${APP_PORT:8080}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

ragchat:
  security:
    api-key: ${API_KEY}
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000}
  rate-limit:
    capacity: ${RATE_LIMIT_CAPACITY:60}
    refill-duration-seconds: ${RATE_LIMIT_REFILL_SECONDS:60}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{requestId}] %logger{36} - %msg%n"
  level:
    com.nagarro.ragchat: INFO
